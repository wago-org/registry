<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <!-- Path-based routing: keep relative asset URLs resolving from the site
             root even on deep paths like /wago-org/dragline-x64. -->
        <base href="/" />
        <!-- prerender:seo:start (build-time per-page OG/title injection; keep this block together) -->
        <title>wago plugins — registry</title>
        <meta
            name="description"
            content="The wago plugin registry — host-import bundles, WASI shims, debuggers and codegen backends. Drop-in Go modules for the wago WebAssembly engine."
        />
        <link rel="canonical" href="https://plugins.wago.sh/" />
        <meta property="og:site_name" content="wago plugins" />
        <meta property="og:type" content="website" />
        <meta property="og:title" content="wago plugins — registry" />
        <meta
            property="og:description"
            content="Extend your runtime. One import away. Browse and publish plugins for the wago WebAssembly engine."
        />
        <meta property="og:url" content="https://plugins.wago.sh/" />
        <meta property="og:image" content="https://plugins.wago.sh/assets/wago-logo.png" />
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="wago plugins — registry" />
        <meta
            name="twitter:description"
            content="Extend your runtime. One import away. Browse and publish plugins for the wago WebAssembly engine."
        />
        <meta name="twitter:image" content="https://plugins.wago.sh/assets/wago-logo.png" />
        <!-- prerender:seo:end -->
        <meta name="theme-color" content="#1a1547" />

        <link rel="icon" type="image/png" href="/assets/wago-logo.png" sizes="any" />
        <link rel="apple-touch-icon" href="/assets/wago-logo.png" />
        <link rel="manifest" href="/site.webmanifest" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="assets/css/tokens.css" />

        <script>
            // Where the Go backend lives.
            //   • Production (plugins.wago.sh) → the deployed backend at api.plugins.wago.sh.
            //   • Local dev (localhost) → apiBase stays unset so the frontend targets
            //     http://localhost:8787, falling back to demo mode if it's not up.
            window.WAGO_CONFIG = {
                apiBase:
                    location.hostname === "localhost" || location.hostname === "127.0.0.1"
                        ? undefined
                        : "https://api.plugins.wago.sh",
            };
        </script>
    </head>
    <body>
        <div id="app"></div>
        <noscript>
            <div style="max-width: 640px; margin: 80px auto; padding: 0 24px; text-align: center; color: #b3a6e0">
                <h1 style="color: #f3effd">wago plugins</h1>
                <p>
                    This registry is an interactive app and needs JavaScript. Browse the
                    plugins directly on
                    <a href="https://github.com/wago-org" style="color: #c3a8ff">GitHub</a>.
                </p>
            </div>
        </noscript>
        <script type="module" src="assets/js/main.js"></script>
    </body>
</html>
